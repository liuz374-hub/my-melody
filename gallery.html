<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - My Melody</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a class="nav-logo" href="index.html" aria-label="Go to homepage">
                <img src="images/logo.png" alt="My Melody Logo">
            </a>
            <ul class="nav-links">
                <li><a href="index.html"><img src="images/nav-home.png" alt="Home"></a></li>

                </div>
                <div class="gallery-item">

                </div>

                </div>
                <div class="gallery-item">
                    <img src="images/gallery-10.jpg" alt="My Melody Photo 10">

                </div>
                <div class="gallery-item">
                    <img src="images/gallery-12.jpg" alt="My Melody Photo 12">
                </div>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="">
    </div>

    <script src="js/script.js"></script>

</html>
